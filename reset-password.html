<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | DogAI</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #e8a020;
      --danger: #dc2626;
      --ok: #15803d;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Arial, sans-serif;
      background: radial-gradient(circle at top, #fff5df 0%, var(--bg) 45%);
      color: var(--text);
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(17, 24, 39, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }
    label {
      font-size: 13px;
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(232, 160, 32, 0.14);
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
    }
    .error { color: var(--danger); }
    .success { color: var(--ok); }
    .link {
      margin-top: 14px;
      display: inline-block;
      font-size: 13px;
      color: #1d4ed8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Reset Your Password</h1>
    <p>Enter a new password for your DogAI account.</p>

    <form id="resetForm">
      <label for="password">New Password</label>
      <input id="password" type="password" minlength="6" required placeholder="Minimum 6 characters" />

      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" minlength="6" required placeholder="Re-enter new password" />

      <button id="submitBtn" type="submit">Reset Password</button>
      <div id="message" class="msg"></div>
    </form>

    <a class="link" href="index.html">Back to Home</a>
  </main>

  <script>
    const API_BASE_CANDIDATES = (() => {
      const host = window.location.hostname;
      const list = [];

      if (host === 'localhost' || host === '127.0.0.1') {
        list.push('http://localhost:5000/api');
      }

      list.push(`${window.location.origin}/api`);
      list.push('https://dogai-backend.onrender.com/api');

      if (!list.includes('http://localhost:5000/api')) {
        list.push('http://localhost:5000/api');
      }

      return [...new Set(list)];
    })();
    const form = document.getElementById('resetForm');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    function setMessage(text, type) {
      message.textContent = text;
      message.className = `msg ${type || ''}`;
    }

    if (!token) {
      setMessage('Invalid reset link. Please request a new one.', 'error');
      submitBtn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = passwordInput.value.trim();
      const confirmPassword = confirmInput.value.trim();

      if (password.length < 6) {
        setMessage('Password must be at least 6 characters.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        setMessage('Passwords do not match.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting...';
      setMessage('');

      try {
        let handled = false;

        for (const base of API_BASE_CANDIDATES) {
          try {
            const res = await fetch(`${base}/auth/reset-password`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token, password })
            });

            const ct = res.headers.get('content-type') || '';
            if (!ct.includes('application/json')) continue;

            const data = await res.json();
            handled = true;

            if (!res.ok || !data.success) {
              setMessage(data.message || 'Reset failed. Please try again.', 'error');
              submitBtn.disabled = false;
              submitBtn.textContent = 'Reset Password';
              return;
            }

            setMessage('Password reset successful. Redirecting to home...', 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 1800);
            return;
          } catch (_) {
            continue;
          }
        }

        if (!handled) {
          throw new Error('No reachable API endpoint');
        }
      } catch (err) {
        setMessage('Server not reachable. Try again in a moment.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
